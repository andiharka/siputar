name: Release

on:
  push:
    tags:
      - "v*" # Trigger on version tags like v1.0.0, v0.1.0, etc.

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Get version from tag
        id: tag_name
        run: echo "current_version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create-release
        uses: actions/github-script@v9
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.tag_name.outputs.current_version }}`,
              name: `SIPUTAR v${{ steps.tag_name.outputs.current_version }}`,
              body: `## What's Changed\n\nSee the [commits](https://github.com/${context.repo.owner}/${context.repo.repo}/commits/v${{ steps.tag_name.outputs.current_version }}) for details.\n\n## Installation\n\nDownload the appropriate installer for your platform:\n\n### macOS\n1. Download the \`.dmg\` file\n2. Open and drag to Applications\n3. **Important:** Run this command in Terminal to allow the unsigned app to open:\n   \`\`\`bash\n   xattr -cr "/Applications/SIPUTAR.app"\n   \`\`\`\n4. Double-click to launch\n\n### Windows\n1. Download the \`.msi\` installer\n2. Run the installer\n3. If SmartScreen appears, click "More info" → "Run anyway"\n\n### Linux\n- **Debian/Ubuntu**: Download \`.deb\` and install with \`sudo dpkg -i siputar_*.deb\`\n- **Universal**: Download \`.AppImage\`, make executable (\`chmod +x\`), and run\n\n> **Note:** Builds are unsigned. This is normal for open-source projects. See [README](https://github.com/${context.repo.owner}/${context.repo.repo}#troubleshooting) for details.`,
              draft: false,
              prerelease: false
            })
            return data.id

  build-release:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: bun install

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          assetNamePattern: "[platform]_[name]_[version]_[arch][ext]"
          args: --verbose
